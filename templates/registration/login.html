<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — TaskPlanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark">
<div class="card" style="width: 380px;">
    <div class="card-body p-4">
        <div class="text-center mb-4">
            <div class="display-6 fw-bold text-primary mb-2">
                <i class="bi bi-kanban-fill me-2"></i>TaskPlanner
            </div>
            <p class="text-muted">Интеллектуальный планировщик задач</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-circle me-2"></i>
            Неверное имя пользователя или пароль.
        </div>
        {% endif %}

        <form method="post" autocomplete="on">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Имя пользователя</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="username" autocomplete="username" autofocus required
                           value="nikita">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="id_password"
                           class="form-control" placeholder="••••••••"
                           autocomplete="current-password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="bi bi-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary w-100 mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
        </form>

        <div class="text-center mt-3 small">
            <span class="text-muted">Нет аккаунта?</span>
            <a href="/accounts/register/" class="text-primary ms-1">Создать аккаунт</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const input = document.getElementById('id_password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
</body>
</html>
